name: Deploy Website

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: production-deploy
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Build application
        run: npm run build

  deploy:
    runs-on: ubuntu-latest
    needs: validate
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      # ✅ Setup SSH key (base64 method — fixes libcrypto issue)
      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SERVER_SSH_KEY_BASE64 }}" | base64 -d > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519

      # ✅ Add server to known hosts
      - name: Add server to known hosts
        env:
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          SERVER_PORT: ${{ secrets.SERVER_PORT }}
        run: |
          ssh-keyscan -p "${SERVER_PORT:-22}" -H "$SERVER_HOST" >> ~/.ssh/known_hosts

      # ✅ Deploy to server
      - name: Run production deploy
        env:
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          SERVER_PORT: ${{ secrets.SERVER_PORT }}
          SERVER_USER: ${{ secrets.SERVER_USER }}
          SERVER_APP_DIR: ${{ secrets.SERVER_APP_DIR }}
          DEPLOY_BRANCH: ${{ github.ref_name }}
          NODE_ENV: production
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          NEXTAUTH_SECRET: ${{ secrets.NEXTAUTH_SECRET }}
          NEXTAUTH_URL: ${{ secrets.NEXTAUTH_URL }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          ADMIN_USERNAME: ${{ secrets.ADMIN_USERNAME }}
          ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}
          DEPLOY_MODE: docker
          FRONTEND_SERVICE: ${{ secrets.FRONTEND_SERVICE }}
          BACKEND_SERVICE: ${{ secrets.BACKEND_SERVICE }}
        run: |
          ssh -i ~/.ssh/id_ed25519 -p "${SERVER_PORT:-22}" "${SERVER_USER}@${SERVER_HOST}" \
            "APP_DIR='${SERVER_APP_DIR}' \
             DEPLOY_BRANCH='${DEPLOY_BRANCH}' \
             NODE_ENV='${NODE_ENV}' \
             DATABASE_URL='${DATABASE_URL}' \
             NEXTAUTH_SECRET='${NEXTAUTH_SECRET}' \
             NEXTAUTH_URL='${NEXTAUTH_URL}' \
             DB_PASSWORD='${DB_PASSWORD}' \
             ADMIN_USERNAME='${ADMIN_USERNAME}' \
             ADMIN_PASSWORD='${ADMIN_PASSWORD}' \
             DEPLOY_MODE='${DEPLOY_MODE}' \
             FRONTEND_SERVICE='${FRONTEND_SERVICE:-devmain-frontend.service}' \
             BACKEND_SERVICE='${BACKEND_SERVICE:-devmain-backend.service}' \
             bash -s" < scripts/deploy.sh

      - name: Verify deployment
        env:
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          SERVER_PORT: ${{ secrets.SERVER_PORT }}
          SERVER_USER: ${{ secrets.SERVER_USER }}
          SERVER_APP_DIR: ${{ secrets.SERVER_APP_DIR }}
        run: |
          echo "Checking Docker container status..."
          ssh -p "${SERVER_PORT:-22}" "${SERVER_USER}@${SERVER_HOST}" \
            "cd '${SERVER_APP_DIR}' && docker-compose -f docker-compose.prod.yml ps && echo 'Checking container health...' && docker-compose -f docker-compose.prod.yml exec app curl -f http://localhost:3000/api/health && docker-compose -f docker-compose.prod.yml exec admin-backend curl -f http://localhost:8000/api/health && echo 'All containers are running successfully'"
