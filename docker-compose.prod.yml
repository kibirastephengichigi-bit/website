version: '3.8'

services:
  # Next.js Frontend Application
  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        - NODE_ENV=production
        - NEXTAUTH_SECRET=${NEXTAUTH_SECRET}
        - NEXTAUTH_URL=${NEXTAUTH_URL:-https://devmain.co.ke}
        - DATABASE_URL=${DATABASE_URL}
    container_name: devmain-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - DATABASE_URL=${DATABASE_URL}
      - NEXTAUTH_URL=${NEXTAUTH_URL:-https://devmain.co.ke}
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
      - JWT_SECRET=${JWT_SECRET}
    command: >
      sh -c "
        npx prisma generate &&
        npm run start
      "
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - uploads:/app/public/uploads
      - ./.next:/app/.next
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # PostgreSQL Database
  db:
    image: postgres:15-alpine
    container_name: devmain-postgres
    restart: unless-stopped
    environment:
      - POSTGRES_DB=stephenasatsa
      - POSTGRES_USER=stephenasatsa_user
      - POSTGRES_PASSWORD=${DB_PASSWORD:-secure_password}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./prisma/migrations:/docker-entrypoint-initdb.d/migrations
      - ./backups:/backups
    networks:
      - app-network
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U stephenasatsa_user -d stephenasatsa"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # Python Admin Backend
  admin-backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: devmain-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - ADMIN_API_PORT=8000
      - ADMIN_ALLOWED_ORIGIN=${NEXTAUTH_URL:-https://devmain.co.ke}
      - ADMIN_USERNAME=${ADMIN_USERNAME:-admin}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-change-me-now}
      - ADMIN_TOTP_SECRET=${ADMIN_TOTP_SECRET}
    volumes:
      - ./lib/content:/app/lib/content
      - uploads:/app/public/uploads
      - ./logs:/app/logs
    networks:
      - app-network
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Nginx Reverse Proxy
  nginx:
    image: nginx:alpine
    container_name: devmain-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/sites-available:/etc/nginx/sites-available:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./ssl:/etc/nginx/ssl:ro
      - uploads:/var/www/uploads:ro
    depends_on:
      - app
      - admin-backend
    networks:
      - app-network

  # Redis for caching (optional but recommended)
  redis:
    image: redis:7-alpine
    container_name: devmain-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - app-network
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  uploads:
    driver: local

networks:
  app-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16
